<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  {% if page.robots %}<meta name="robots" content="{{ page.robots }}">{% endif %}
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
      color: white;
      padding: 3rem 1.5rem 4rem;
      text-align: center;
    }

    header .logo {
      display: inline-block;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      color: white;
      text-decoration: none;
    }

    header .logo span { color: #90cdf4; }

    header p {
      font-size: 1.1rem;
      opacity: 0.85;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Main wrapper ── */
    .site-main {
      max-width: 860px;
      width: 100%;
      margin: -2rem auto 3rem;
      padding: 0 1.25rem;
      flex: 1;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1.25rem;
      font-size: 0.85rem;
      color: #718096;
      border-top: 1px solid #e2e8f0;
      background: white;
    }

    footer a {
      color: #4a5568;
      text-decoration: none;
      margin: 0 0.75rem;
    }

    footer a:hover { color: #2b6cb0; text-decoration: underline; }

    footer .separator { margin: 0 0.25rem; color: #cbd5e0; }

    /* ── App list (index) ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #718096;
      margin-bottom: 1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      object-fit: cover;
    }

    .app-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a365d;
      margin-bottom: 0.2rem;
    }

    .app-tagline { font-size: 0.9rem; color: #718096; }

    .app-description {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #4a5568;
      margin-bottom: 1.5rem;
    }

    .features {
      list-style: none;
      margin-bottom: 1.75rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .features li {
      font-size: 0.875rem;
      color: #4a5568;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .features li::before {
      content: "✓";
      color: #3182ce;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .store-badges {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .store-badge-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .store-badge-wrap a {
      display: block;
      opacity: 0.4;
      pointer-events: none;
      cursor: default;
      transition: opacity 0.15s;
    }

    .store-badge-wrap.active a {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    .store-badge-wrap.active a:hover { opacity: 0.85; }

    .store-badge-wrap img { height: 44px; width: auto; display: block; }

    .store-badge-wrap .coming-soon-label {
      font-size: 0.65rem;
      color: #718096;
      background: #edf2f7;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
    }

    /* ── Support card ── */
    .support-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .support-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: #ebf8ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .support-link {
      display: inline-block;
      color: #2b6cb0;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
    }

    .support-link:hover { text-decoration: underline; }

    /* ── Prose pages (Impressum, Datenschutz) ── */
    .site-main.prose {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
    }

    .site-main.prose h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a365d;
      margin-bottom: 1.5rem;
    }

    .site-main.prose h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
      margin: 2rem 0 0.75rem;
    }

    .site-main.prose p {
      font-size: 0.925rem;
      line-height: 1.75;
      color: #4a5568;
      margin-bottom: 0.85rem;
    }

    .site-main.prose ul {
      margin: 0.5rem 0 1rem 1.25rem;
      color: #4a5568;
    }

    .site-main.prose li {
      font-size: 0.925rem;
      line-height: 1.7;
      margin-bottom: 0.25rem;
    }

    .site-main.prose hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 1.5rem 0;
    }

    .site-main.prose a { color: #2b6cb0; }
    .site-main.prose a:hover { text-decoration: underline; }

    .site-main.prose strong { color: #2d3748; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .features { grid-template-columns: 1fr; }
      .app-header { flex-direction: column; align-items: flex-start; }
      header .logo { font-size: 2rem; }
      .site-main.prose { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="{{ '/' | relative_url }}">⚓ Nauti<span>tools</span></a>
  <p>Praktische Apps für Segler und Motorbootfahrer</p>
</header>

<main class="site-main{% if page.main_class %} {{ page.main_class }}{% endif %}">
  {{ content }}
</main>

<footer>
  &copy; {{ site.time | date: "%Y" }} Lars Gentz
  <span class="separator">·</span>
  <a href="{{ '/impressum/' | relative_url }}">Impressum</a>
  <span class="separator">·</span>
  <a href="{{ '/datenschutz/' | relative_url }}">Datenschutz</a>
</footer>

</body>
</html>
