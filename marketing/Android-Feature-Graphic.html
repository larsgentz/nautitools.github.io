<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Feature Graphic – Ankerkettenrechner</title>
  <style>
    /* ── Canvas: exactly 1024 × 500 px ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1024px;
      height: 500px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1024px;
      height: 500px;
      background: linear-gradient(135deg, #0a1628 0%, #0f2547 40%, #1a3a6e 75%, #1e4d8c 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* ── Decorative circles ── */
    .deco-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .ring-1 { width: 600px; height: 600px; top: -200px; right: -60px; }
    .ring-2 { width: 440px; height: 440px; top: -120px; right:  20px; }
    .ring-3 { width: 280px; height: 280px; top: -40px;  right: 100px; }

    /* ── Glow behind icon ── */
    .icon-glow {
      position: absolute;
      right: 100px;
      top: 50%;
      transform: translateY(-50%);
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,179,237,0.18) 0%, transparent 70%);
    }

    /* ── Wave accent ── */
    .wave-accent {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #63b3ed 30%, #90cdf4 50%, #63b3ed 70%, transparent);
      opacity: 0.6;
    }

    /* ── Left content ── */
    .left {
      position: relative;
      z-index: 2;
      padding: 0 0 0 72px;
      flex: 0 0 580px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #90cdf4;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 2px;
      background: #63b3ed;
      border-radius: 2px;
    }

    .app-title {
      font-size: 54px;
      font-weight: 800;
      line-height: 1.05;
      color: #ffffff;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .app-title span {
      color: #63b3ed;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #63b3ed, #90cdf4);
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 19px;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
      line-height: 1.5;
      max-width: 380px;
    }

    .tagline strong {
      color: #ffffff;
      font-weight: 600;
    }

    /* ── Right: App icon ── */
    .right {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-icon-wrap {
      position: relative;
    }

    .app-icon-wrap img {
      width: 210px;
      height: 210px;
      border-radius: 46px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10),
        0 20px 60px rgba(0,0,0,0.55),
        0 0 80px rgba(99,179,237,0.15);
      display: block;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- Decorative rings -->
    <div class="deco-ring ring-1"></div>
    <div class="deco-ring ring-2"></div>
    <div class="deco-ring ring-3"></div>

    <!-- Glow -->
    <div class="icon-glow"></div>

    <!-- Bottom accent line -->
    <div class="wave-accent"></div>

    <!-- Left: Text -->
    <div class="left">
      <div class="brand">Nautitools</div>
      <div class="app-title">Ankerketten-<br><span>rechner</span></div>
      <div class="divider"></div>
      <p class="tagline">Die richtige Kettenlänge –<br><strong>schnell und zuverlässig berechnet.</strong></p>
    </div>

    <!-- Right: Icon -->
    <div class="right">
      <div class="app-icon-wrap">
        <img src="icon_chain_calculator.png" alt="Ankerkettenrechner Icon">
      </div>
    </div>

  </div>
</body>
</html>
